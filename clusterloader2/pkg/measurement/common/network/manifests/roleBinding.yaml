apiVersion: v1
kind: List
items:
- apiVersion: rbac.authorization.k8s.io/v1
  kind: ClusterRoleBinding
  metadata:
    name: networktestrequests-rbac
  subjects:
    - kind: ServiceAccount
      name: default
      namespace: netperf
  roleRef:
    kind: ClusterRole
    name: cluster-admin
    apiGroup: rbac.authorization.k8s.io
- apiVersion: rbac.authorization.k8s.io/v1
  kind: Role
  metadata:
    name: networktestrequests-role
    namespace: netperf
  rules:
  - apiGroups: ["clusterloader.io"]
    resources: ["networktestrequests"]
    verbs: ["get", "list", "watch", "update", "patch"]
- apiVersion: rbac.authorization.k8s.io/v1
  kind: RoleBinding
  metadata:
    name: networktestrequests-rolebinding
    namespace: netperf
  subjects:
  - kind: ServiceAccount
    name: default
    namespace: netperf
  roleRef:
    kind: Role
    name: networktestrequests-role
    apiGroup: rbac.authorization.k8s.io
