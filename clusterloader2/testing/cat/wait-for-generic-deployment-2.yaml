# CAT: WaitForGenericK8sObjects for Deployment with 2 replicas.
name: cat-wait-for-generic-deployment-2
namespace:
  number: 1
tuningSets:
- name: default
  globalQPSLoad:
    qps: 1
    burst: 2
steps:
- name: Create 1 Deployment (2 replicas)
  phases:
  - namespaceRange:
      min: 1
      max: 1
    replicasPerNamespace: 1
    tuningSet: default
    objectBundle:
    - basename: cat-generic-dep-2
      objectTemplatePath: deployment-2replicas.yaml
- name: Wait for deployment Available
  measurements:
  - Identifier: WaitCatDep2Available
    Method: WaitForGenericK8sObjects
    Params:
      objectGroup: apps
      objectVersion: v1
      objectResource: deployments
      namespaceRange:
        min: 1
        max: 1
      timeout: 2m
      successfulConditions:
      - "Available=True"
      failedConditions: []
      minDesiredObjectCount: 1
      maxFailedObjectCount: 0
