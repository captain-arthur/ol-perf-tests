# CAT: Timer with 3s between start/stop.
name: cat-timer-3s
namespace:
  number: 1
steps:
- name: Start timer
  measurements:
  - Identifier: CatTimer3s
    Method: Timer
    Params:
      action: start
      label: step1
- name: Sleep 3s
  measurements:
  - Identifier: Sleep3s
    Method: Sleep
    Params:
      duration: 3s
- name: Stop timer and gather
  measurements:
  - Identifier: CatTimer3s
    Method: Timer
    Params:
      action: stop
      label: step1
  - Identifier: CatTimer3s
    Method: Timer
    Params:
      action: gather
