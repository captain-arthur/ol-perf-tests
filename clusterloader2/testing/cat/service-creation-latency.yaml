# CAT: ServiceCreationLatency (create Deployment + ClusterIP Service, measure creation/readiness).
# Requires: --enable-exec-service (measurement uses exec pod to curl ClusterIP:80 for reachability).
# SLO: CL2 ServiceCreationLatency has no threshold; assertion not supported. Use post-processing for SLO.
name: cat-service-creation-latency
namespace:
  number: 1
tuningSets:
- name: default
  globalQPSLoad:
    qps: 1
    burst: 2
steps:
- name: Start service creation latency measurement
  measurements:
  - Identifier: CatServiceCreationLatency
    Method: ServiceCreationLatency
    Params:
      action: start
      labelSelector: group=cat-svc
      waitTimeout: 5m
- name: Create Deployment and Service
  phases:
  - namespaceRange:
      min: 1
      max: 1
    replicasPerNamespace: 1
    tuningSet: default
    objectBundle:
    - basename: cat-svc-dep
      objectTemplatePath: deployment-for-svc.yaml
    - basename: cat-svc
      objectTemplatePath: service-clusterip.yaml
- name: Gather service creation latency (skip waitForReady in minimal run to avoid timeout)
  measurements:
  - Identifier: CatServiceCreationLatency
    Method: ServiceCreationLatency
    Params:
      action: gather
