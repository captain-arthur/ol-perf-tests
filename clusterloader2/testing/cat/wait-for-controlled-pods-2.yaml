# CAT: WaitForControlledPodsRunning with 2 replicas.
name: cat-wait-for-controlled-pods-2
namespace:
  number: 1
tuningSets:
- name: default
  globalQPSLoad:
    qps: 1
    burst: 2
steps:
- name: Start wait measurement
  measurements:
  - Identifier: WaitCatDeploy2
    Method: WaitForControlledPodsRunning
    Params:
      action: start
      apiVersion: apps/v1
      kind: Deployment
      labelSelector: group=cat-controlled-2
      operationTimeout: 5m
- name: Create 1 Deployment (2 replicas)
  phases:
  - namespaceRange:
      min: 1
      max: 1
    replicasPerNamespace: 1
    tuningSet: default
    objectBundle:
    - basename: cat-deploy-2
      objectTemplatePath: deployment-2replicas.yaml
- name: Wait for controlled pods running
  measurements:
  - Identifier: WaitCatDeploy2
    Method: WaitForControlledPodsRunning
    Params:
      action: gather
