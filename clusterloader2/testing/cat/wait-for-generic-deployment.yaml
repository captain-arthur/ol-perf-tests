# CAT: WaitForGenericK8sObjects (create 1 Deployment, wait until Available).
# SLO: CL2 WaitForGenericK8sObjects has no threshold; assertion not supported. Use post-processing for SLO.
name: cat-wait-for-generic-deployment
namespace:
  number: 1
tuningSets:
- name: default
  globalQPSLoad:
    qps: 1
    burst: 2
steps:
- name: Create 1 Deployment
  phases:
  - namespaceRange:
      min: 1
      max: 1
    replicasPerNamespace: 1
    tuningSet: default
    objectBundle:
    - basename: cat-generic-dep
      objectTemplatePath: deployment.yaml
- name: Wait for deployment Available
  measurements:
  - Identifier: WaitCatDeploymentAvailable
    Method: WaitForGenericK8sObjects
    Params:
      objectGroup: apps
      objectVersion: v1
      objectResource: deployments
      namespaceRange:
        min: 1
        max: 1
      timeout: 2m
      successfulConditions:
      - "Available=True"
      failedConditions: []
      minDesiredObjectCount: 1
      maxFailedObjectCount: 0
