# CAT: JobLifecycleLatency with 2 Jobs.
name: cat-job-lifecycle-latency-2
namespace:
  number: 1
tuningSets:
- name: default
  globalQPSLoad:
    qps: 1
    burst: 2
steps:
- name: Start job lifecycle latency measurement
  measurements:
  - Identifier: CatJobLifecycle2
    Method: JobLifecycleLatency
    Params:
      action: start
      labelSelector: group=cat-job-2
- name: Create 2 Jobs
  phases:
  - namespaceRange:
      min: 1
      max: 1
    replicasPerNamespace: 2
    tuningSet: default
    objectBundle:
    - basename: cat-job-lifecycle-2
      objectTemplatePath: job-2.yaml
- name: Gather job lifecycle latency
  measurements:
  - Identifier: CatJobLifecycle2
    Method: JobLifecycleLatency
    Params:
      action: gather
      timeout: 2m
