# Minimal Job for CAT (1 pod, exits after sleep).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{.Name}}
  labels:
    group: cat-job
spec:
  parallelism: 1
  completions: 1
  template:
    metadata:
      labels:
        group: cat-job
    spec:
      containers:
      - name: sleep
        image: registry.k8s.io/e2e-test-images/busybox:1.29-1
        command: ["sleep", "5"]
      restartPolicy: Never
