# CAT: Create 1 Secret then sleep 1s.
name: cat-create-secret
namespace:
  number: 1
tuningSets:
- name: default
  globalQPSLoad:
    qps: 1
    burst: 2
steps:
- name: Create 1 Secret
  phases:
  - namespaceRange:
      min: 1
      max: 1
    replicasPerNamespace: 1
    tuningSet: default
    objectBundle:
    - basename: cat-secret
      objectTemplatePath: secret.yaml
- name: Sleep 1s
  measurements:
  - Identifier: Sleep1s
    Method: Sleep
    Params:
      duration: 1s
