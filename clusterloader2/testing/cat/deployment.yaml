apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Name}}
  labels:
    group: cat-controlled
spec:
  selector:
    matchLabels:
      group: cat-controlled
      name: {{.Name}}
  replicas: 1
  template:
    metadata:
      labels:
        group: cat-controlled
        name: {{.Name}}
    spec:
      containers:
      - name: pause
        image: registry.k8s.io/pause:3.9
