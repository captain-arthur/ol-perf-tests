# CAT: Create 1 Deployment then sleep 5s.
name: cat-create-deployment-and-sleep
namespace:
  number: 1
tuningSets:
- name: default
  globalQPSLoad:
    qps: 1
    burst: 2
steps:
- name: Create 1 Deployment
  phases:
  - namespaceRange:
      min: 1
      max: 1
    replicasPerNamespace: 1
    tuningSet: default
    objectBundle:
    - basename: cat-dep-sleep
      objectTemplatePath: deployment.yaml
- name: Sleep 5s
  measurements:
  - Identifier: Sleep5s
    Method: Sleep
    Params:
      duration: 5s
