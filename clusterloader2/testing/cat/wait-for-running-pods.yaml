# CAT prototype: WaitForRunningPods (1 pod).
# SLO: CL2 WaitForRunningPods has timeout only, no latency SLO; assertion not supported. Use post-processing for SLO.
name: cat-wait-for-running-pods
namespace:
  number: 1
tuningSets:
- name: default
  globalQPSLoad:
    qps: 1
    burst: 2
steps:
- name: Create 1 pod
  phases:
  - namespaceRange:
      min: 1
      max: 1
    replicasPerNamespace: 1
    tuningSet: default
    objectBundle:
    - basename: cat-pod
      objectTemplatePath: pod.yaml
- name: Wait for 1 pod running
  measurements:
  - Identifier: WaitCatPods
    Method: WaitForRunningPods
    Params:
      action: gather
      timeout: 2m
      desiredPodCount: 1
      labelSelector: group=cat-wait-pods
